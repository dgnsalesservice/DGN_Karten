        .custom-control {

        }
        .custom-control2 {

            left: 0px;

        }
        .custom-marker {
            width: 15px;
            height: 15px;
            background-color: grey;
            border-radius: 50%;
            border: 1px solid white;
        }
        #legend {
            position: absolute;
            bottom: 80px;
            left: 55px;
            display: none;
            z-index: 1000;

            padding: 10px;
            border-radius: 5px;

        }
       .grayscale-tiles, .grayscale-tile {

<body>
    <div id="map"></div>
    <div id="legend">
        <div><span style="display:inline-block; width:20px; height:10px; background:#FF7F00; margin-right:5px;"></span>Ausbauphase 1: Ausbau bei ausreichender Nachfrage</div>
        <div><span style="display:inline-block;width:20px; height:10px; background:#00143C; margin-right:5px;"></span>Ausbauphase 2: Interessenbekundung möglich</div>
    </div>
    <script>
    const bounds = [[51.917132183, 11.79215866], [51.928510181, 11.810413239]];
    const map = L.map('map', {zoomControl: false});
      map.fitBounds(bounds);
        const maptiler = L.tileLayer('https://api.maptiler.com/maps/basic/{z}/{x}/{y}.png?key=UrGMdlREnrfymuiwCa7d',
        {attribution: '&copy; MapTiler https://maptiler.com', tileSize: 512, zoomOffset: -1, maxZoom: 20, className: 'grayscale-tiles',
        }).addTo(map);
        L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        const geoJsonData = {"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "MultiPolygon", "coordinates": [[[[11.792824872, 51.918041465], [11.793566663, 51.91807201], [11.793551876, 51.918260007], [11.794141896, 51.918300541], [11.79409586, 51.918695473], [11.792869357, 51.91863809], [11.792818737, 51.918984363], [11.79215866, 51.918982182], [11.79614413, 51.923097001], [11.796724838, 51.924398286], [11.798128334, 51.926254678], [11.79824189, 51.926386719], [11.798783631, 51.92699028], [11.799619106, 51.927527336], [11.801148328, 51.928051461], [11.803191163, 51.928376484], [11.80813102, 51.928510181], [11.808229702, 51.927468509], [11.810413239, 51.92745678], [11.8097984, 51.9246316], [11.8071695, 51.9217957], [11.805414301, 51.921683], [11.805477899, 51.9210854], [11.8048425, 51.920963], [11.805064901, 51.9199678], [11.8058623, 51.9201308], [11.8095016, 51.9206173], [11.809397686, 51.919542302], [11.807939578, 51.917767037], [11.795895961, 51.917132183], [11.794985582, 51.917281022], [11.794430401, 51.917405943], [11.79264575, 51.917807506], [11.792824872, 51.918041465]], [[11.798370744, 51.91904305], [11.798313904, 51.91944806], [11.797320638, 51.919392046], [11.797367526, 51.918997092], [11.798370744, 51.91904305]]]]}, "properties": {"dgn_phase": 2}}]};
         L.imageOverlay("output_tiles/sp_1791.png", bounds).addTo(map);
        const zoomFullExtentControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                const container = L.DomUtil.create('div', 'custom-control');
                container.innerHTML = '<i class="fas fa-home"></i>';
                L.DomEvent.on(container, 'click', () => map.fitBounds(bounds));
                return container;
            }
        });
        map.addControl(new zoomFullExtentControl());
        const legendControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                const container = L.DomUtil.create('div', 'custom-control2');
                container.innerHTML = '<i class="fas fa-list"></i>';
                L.DomEvent.on(container, 'click', () => {
                    const legend = document.getElementById('legend');
                    legend.style.display = legend.style.display === 'none' ? 'block' : 'none';
                });
                return container;
            }
        });
        map.addControl(new legendControl());
        const markerLayerGroup = L.layerGroup().addTo(map);
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false
        })
            .on('markgeocode', function (e) {
                markerLayerGroup.clearLayers();
                const latlng = e.geocode.center;
                const customMarker = L.divIcon({
                    className: 'custom-marker'
                });
                const marker = L.marker(latlng, { icon: customMarker });
                markerLayerGroup.addLayer(marker);
                map.fitBounds(bounds);
            })
            .addTo(map);
    </script>
</body>
</html>

            width: 15px;

            position: absolute;

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

<body>
    <div id="map"></div>
    <div id="legend">
        <div><span style="display:inline-block; width:20px; height:10px; background:#FF7F00; margin-right:5px;"></span>Ausbauphase 1: Ausbau bei ausreichender Nachfrage</div>
        <div><span style="display:inline-block;width:20px; height:10px; background:#00143C; margin-right:5px;"></span>Ausbauphase 2: Interessenbekundung möglich</div>
    </div>
    <script>
    const bounds = [[48.190590762, 12.692205252], [48.200387406, 12.71330006]];
    const map = L.map('map', {zoomControl: false});
      map.fitBounds(bounds);
        const maptiler = L.tileLayer('https://api.maptiler.com/maps/basic/{z}/{x}/{y}.png?key=UrGMdlREnrfymuiwCa7d',
        {attribution: '&copy; MapTiler https://maptiler.com', tileSize: 512, zoomOffset: -1, maxZoom: 20, className: 'grayscale-tiles',
        }).addTo(map);
        L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        const geoJsonData = {"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "MultiPolygon", "coordinates": [[[[12.71330006, 48.191752361], [12.713103332, 48.190590762], [12.710810608, 48.190735054], [12.708269446, 48.191152829], [12.704334888, 48.192164534], [12.699725833, 48.192426824], [12.697354297, 48.191212502], [12.696527147, 48.191172155], [12.69300898, 48.192379987], [12.692834145, 48.192754128], [12.692777121, 48.192876462], [12.6927145, 48.1937555], [12.693304599, 48.1947563], [12.692205252, 48.196672653], [12.692362588, 48.19770982], [12.693398922, 48.200387406], [12.694531145, 48.200285696], [12.695338098, 48.200209451], [12.698359277, 48.200050227], [12.700906249, 48.200090717], [12.70259244, 48.200107595], [12.702086568, 48.198440403], [12.704278679, 48.197522488], [12.704503511, 48.196716958], [12.7037166, 48.195180794], [12.705459046, 48.195030922], [12.705683879, 48.193607115], [12.709274164, 48.193457238], [12.709541151, 48.193223055], [12.709723827, 48.192913932], [12.711972146, 48.192689114], [12.71330006, 48.191752361]]]]}, "properties": {"dgn_phase": 1}}]};
         L.imageOverlay("output_tiles/sp_536.png", bounds).addTo(map);
        const zoomFullExtentControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                const container = L.DomUtil.create('div', 'custom-control');
                container.innerHTML = '<i class="fas fa-home"></i>';
                L.DomEvent.on(container, 'click', () => map.fitBounds(bounds));
                return container;
            }
        });
        map.addControl(new zoomFullExtentControl());
        const legendControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                const container = L.DomUtil.create('div', 'custom-control2');
                container.innerHTML = '<i class="fas fa-list"></i>';
                L.DomEvent.on(container, 'click', () => {
                    const legend = document.getElementById('legend');
                    legend.style.display = legend.style.display === 'none' ? 'block' : 'none';
                });
                return container;
            }
        });
        map.addControl(new legendControl());
        const markerLayerGroup = L.layerGroup().addTo(map);
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false
        })
            .on('markgeocode', function (e) {
                markerLayerGroup.clearLayers();
                const latlng = e.geocode.center;
                const customMarker = L.divIcon({
                    className: 'custom-marker'
                });
                const marker = L.marker(latlng, { icon: customMarker });
                markerLayerGroup.addLayer(marker);
                map.fitBounds(bounds);
            })
            .addTo(map);
    </script>
</body>
</html>
